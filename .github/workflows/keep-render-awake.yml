name: Manter API ativa

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-render-awake
  cancel-in-progress: true

jobs:
  ping:
    name: Verificar API
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Chamar endpoint de saúde
        env:
          HEALTH_URL: https://api.ainzlink.com/health
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --retry 3 \
            --retry-delay 10 \
            --max-time 60 \
            "$HEALTH_URL"
